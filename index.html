```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>reizastore</title>

<style>

:root{
--utama:#e6d5c3;
--bg:#f8f1e7;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

/* HEADER */

header{
background:var(--utama);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

header h1{
margin:0;
}

/* KERANJANG */

.cart-icon{
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.cart-panel{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-5px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

.cart-panel.show{
right:0;
}

/* GRID PRODUK */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.harga{
color:#7a5b45;
font-weight:bold;
}

button{
background:var(--utama);
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
margin-top:15px;
font-weight:bold;
}

.checkout{
margin-top:10px;
width:100%;
padding:10px;
background:#25D366;
color:white;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<h1>reizastore</h1>

<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

</header>

<div class="grid" id="produkGrid"></div>

<div class="cart-panel" id="cartPanel">

<h2>Keranjang</h2>

<div id="cartItems"></div>

<div class="total">
Total: Rp <span id="totalHarga">0</span>
</div>

<button class="checkout" onclick="checkoutWA()">
Checkout WhatsApp
</button>

</div>

<script>

/* PRODUK (bisa ditambah disini) */

let produk=[

{
nama:"Baju Uniqlo",
harga:50000,
gambar:"https://via.placeholder.com/300"
},

{
nama:"Baju Adidas",
harga:75000,
gambar:"https://via.placeholder.com/300"
},

{
nama:"Hoodie Thrift",
harga:65000,
gambar:"https://via.placeholder.com/300"
}

]

let cart=[]

let grid=document.getElementById("produkGrid")

produk.forEach((item,index)=>{

grid.innerHTML+=`

<div class="card">

<img src="${item.gambar}">

<div class="card-body">

<h3>${item.nama}</h3>

<div class="harga">Rp ${item.harga}</div>

<button onclick="tambahKeranjang(${index})">
Tambah Keranjang
</button>

</div>

</div>

`

})

function tambahKeranjang(index){

cart.push(produk[index])

updateCart()

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length

let total=0
let html=""

cart.forEach((item,i)=>{

total+=item.harga

html+=`

<div class="cart-item">

${item.nama}

<button onclick="hapusItem(${i})">X</button>

</div>

`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("totalHarga").innerText=total

}

function hapusItem(i){

cart.splice(i,1)

updateCart()

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("show")

}

function checkoutWA(){

if(cart.length==0){

alert("Keranjang kosong")

return

}

let pesan="Halo saya mau pesan:%0A"
let total=0

cart.forEach((item,i)=>{

pesan+=`${i+1}. ${item.nama} - Rp ${item.harga}%0A`

total+=item.harga

})

pesan+=`%0ATotal Rp ${total}`

let nomor="6281913820010"

window.open(`https://wa.me/${nomor}?text=${pesan}`)

}

</script>

</body>
</html>
```
